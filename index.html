<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog App - Autenticación</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- VISTA: LOGIN -->
        <section id="view-login" class="view">
            <div class="auth-container">
                <h2>Iniciar Sesión</h2>
                <form id="form-login">
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                    <p class="auth-switch">¿No tienes cuenta? <a href="#" id="link-to-register">Regístrate aquí</a></p>
                </form>
            </div>
        </section>

        <!-- VISTA: REGISTRO -->
        <section id="view-register" class="view d-none">
            <div class="auth-container">
                <h2>Crear Cuenta</h2>
                <form id="form-register">
                    <div class="form-group">
                        <label for="register-name">Nombre Completo</label>
                        <input type="text" id="register-name" required placeholder="Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Correo Electrónico</label>
                        <input type="email" id="register-email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-primary">Registrarse</button>
                    <p class="auth-switch">¿Ya tienes cuenta? <a href="#" id="link-to-login">Inicia sesión</a></p>
                </form>
            </div>
        </section>
        
    <!-- VISTA: DASHBOARD -->
        <section id="view-dashboard" class="view d-none">
            <header>
                <h1>Mi Blog Personal</h1>
                <div class="user-controls">
                    <span id="user-greeting">Hola, Usuario</span>
                    <button id="btn-logout" class="btn btn-secondary btn-sm">Cerrar Sesión</button>
                </div>
            </header>
            <main class="dashboard-main">
                <section class="posts-section">
                    <div class="section-header">
                        <h2>Mis Publicaciones</h2>
                        <button id="btn-new-post" class="btn btn-primary btn-sm">Nueva Publicación</button>
                    </div>
                    <div id="posts-container" class="posts-grid">
                        <!-- Las tarjetas de los posts irán aquí -->
                    </div>
                </section>
            </main>
        </section>
        
        <!-- VISTA: FORMULARIO POST (Crear/Editar) -->
        <section id="view-post-form" class="view d-none">
            <main class="dashboard-main" style="display: flex; justify-content: center;">
                <div class="auth-container" style="max-width: 700px; padding: 3rem;">
                    <header style="border-bottom: none; margin-bottom: 1rem; padding-bottom: 0;">
                        <h1 id="post-form-title" style="font-size: 1.8rem;">Nueva Publicación</h1>
                        <button id="btn-cancel-post" class="btn btn-secondary btn-sm">Volver</button>
                    </header>
                    <form id="form-post">
                        <input type="hidden" id="post-id">
                        <div class="form-group">
                            <label for="post-title-input">Título de la publicación</label>
                            <input type="text" id="post-title-input" required placeholder="Escribe un título llamativo...">
                        </div>
                        <div class="form-group">
                            <label for="post-image-input">URL de la Imagen (Opcional)</label>
                            <input type="url" id="post-image-input" placeholder="https://ejemplo.com/imagen.jpg">
                        </div>
                        <div class="form-group">
                            <label for="post-content-input">Contenido</label>
                            <textarea id="post-content-input" required placeholder="Escribe tu contenido aquí..." rows="8" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-color); font-family: inherit; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Publicación</button>
                    </form>
                </div>
            </main>
        </section>

        <!-- VISTA: LEER POST -->
        <section id="view-read-post" class="view d-none">
            <main class="dashboard-main" style="display: flex; justify-content: center;">
                <article class="post-read-container auth-container" style="max-width: 800px; padding: 4rem 3rem;">
                    <header style="border-bottom: none; margin-bottom: 1.5rem; padding-bottom: 0;">
                        <h1 id="read-post-title" style="font-size: 2.5rem; line-height: 1.3;">Título del Post</h1>
                        <button id="btn-back-to-dashboard" class="btn btn-secondary btn-sm">Volver al Dashboard</button>
                    </header>
                    <div class="post-meta" style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem;">
                        <span id="read-post-date">Fecha</span> • Por <span id="read-post-author" style="color: var(--primary-color); font-weight: 600;">Autor</span>
                    </div>
                    <img id="read-post-image" src="" alt="Imagen del post" style="width: 100%; border-radius: 12px; margin-bottom: 2rem; display: none; object-fit: cover; max-height: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                    <div id="read-post-content" style="white-space: pre-line; line-height: 1.8; font-size: 1.1rem;">
                        Contenido del post...
                    </div>
                </article>
            </main>
        </section>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
