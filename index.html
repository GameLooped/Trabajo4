<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog App - Autenticación</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- VISTA: LOGIN -->
        <section id="view-login" class="view">
            <div class="auth-container">
                <h2>Iniciar Sesión</h2>
                <form id="form-login">
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                    <p class="auth-switch">¿No tienes cuenta? <a href="#" id="link-to-register">Regístrate aquí</a></p>
                </form>
            </div>
        </section>

        <!-- VISTA: REGISTRO -->
        <section id="view-register" class="view d-none">
            <div class="auth-container">
                <h2>Crear Cuenta</h2>
                <form id="form-register">
                    <div class="form-group">
                        <label for="register-name">Nombre Completo</label>
                        <input type="text" id="register-name" required placeholder="Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Correo Electrónico</label>
                        <input type="email" id="register-email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-primary">Registrarse</button>
                    <p class="auth-switch">¿Ya tienes cuenta? <a href="#" id="link-to-login">Inicia sesión</a></p>
                </form>
            </div>
        </section>
        
    <!-- VISTA: DASHBOARD -->
        <section id="view-dashboard" class="view d-none">
            <header>
                <h1>Mi Blog Personal</h1>
                <div class="user-controls">
                    <span id="user-greeting">Hola, Usuario</span>
                    <button id="btn-logout" class="btn btn-secondary btn-sm">Cerrar Sesión</button>
                </div>
            </header>
            <main class="dashboard-main">
                <section class="posts-section">
                    <div class="section-header">
                        <h2>Mis Publicaciones</h2>
                        <button id="btn-new-post" class="btn btn-primary btn-sm">Nueva Publicación</button>
                    </div>
                    <div id="posts-container" class="posts-grid">
                        <!-- Las tarjetas de los posts irán aquí -->
                    </div>
                </section>
            </main>
        </section>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
